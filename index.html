<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone Matrix | Cognitive Pitch Training</title>
    <style>
        /* Minimalist UI for reduced cognitive load (Mayer's Coherence Principle) */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #FAFAFA; 
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            width: 320px;
        }

        /* Target Character */
        #character-display {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #2C3E50;
        }

        /* Base Pinyin (without tone mark) */
        #pinyin-base {
            font-size: 28px;
            color: #7F8C8D;
            /* Spatial Contiguity: Keep the pinyin very close to the tone buttons */
            margin-bottom: 10px; 
        }

        /* Tone Option Buttons */
        .tone-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .tone-btn {
            font-size: 24px;
            width: 50px;
            height: 50px;
            border: 2px solid #BDC3C7;
            background-color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #34495E;
        }

        .tone-btn:hover {
            border-color: #3498DB;
            background-color: #EBF5FB;
        }

        /* Feedback styling */
        .correct {
            border-color: #2ECC71 !important;
            background-color: #EAFAF1 !important;
            color: #27AE60;
        }

        .wrong {
            border-color: #E74C3C !important;
            background-color: #FDEDEC !important;
            color: #C0392B;
            animation: shake 0.3s ease-in-out;
        }

        #feedback-msg {
            height: 20px;
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        /* Simple shake animation for errors */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Replay Audio Button */
        #replay-btn {
            margin-top: 30px;
            padding: 8px 16px;
            font-size: 14px;
            border: none;
            background-color: #ECF0F1;
            color: #7F8C8D;
            border-radius: 20px;
            cursor: pointer;
        }
        
        #replay-btn:hover {
            background-color: #D5D8DC;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="character-display">字</div>
        <div id="pinyin-base">zi</div>
        
        <div class="tone-controls">
            <button class="tone-btn" onclick="checkTone(1)">—</button>
            <button class="tone-btn" onclick="checkTone(2)">ˊ</button>
            <button class="tone-btn" onclick="checkTone(3)">ˇ</button>
            <button class="tone-btn" onclick="checkTone(4)">ˋ</button>
        </div>

        <div id="feedback-msg"></div>
        <button id="replay-btn" onclick="playAudio()">🔊 Replay Audio</button>
    </div>

    <script>
        // 1. DATA STRUCTURE
        // Focus strictly on phonetics. Expandable array.
        const vocabulary = [
            { char: '媽', base: 'ma', tone: 1 },
            { char: '麻', base: 'ma', tone: 2 },
            { char: '馬', base: 'ma', tone: 3 },
            { char: '罵', base: 'ma', tone: 4 },
            { char: '湯', base: 'tang', tone: 1 },
            { char: '糖', base: 'tang', tone: 2 },
            { char: '躺', base: 'tang', tone: 3 },
            { char: '燙', base: 'tang', tone: 4 }
        ];

        // Global state variables
        let currentWord = null;
        let isProcessing = false;

        // 2. CORE LOGIC
        // Initialize and load the next question
        function loadQuestion() {
            isProcessing = false;
            
            // Clear previous feedback styles from buttons
            document.querySelectorAll('.tone-btn').forEach(btn => {
                btn.className = 'tone-btn'; 
            });
            document.getElementById('feedback-msg').innerText = "";

            // Select a random word from the vocabulary array
            const randomIndex = Math.floor(Math.random() * vocabulary.length);
            currentWord = vocabulary[randomIndex];

            // Update UI with the new character and base pinyin
            document.getElementById('character-display').innerText = currentWord.char;
            document.getElementById('pinyin-base').innerText = currentWord.base;

            // Automatically play the sound (Modality Principle)
            setTimeout(playAudio, 300);
        }

        // 3. AUDIO SYSTEM (The Hack)
        // Web Speech API for Text-to-Speech using a carrier phrase
        function playAudio() {
            if ('speechSynthesis' in window && currentWord) {
                // Cancel any ongoing speech to prevent overlapping
                window.speechSynthesis.cancel(); 

                // Hack: Use a carrier phrase and a full-width comma to force a natural pause
                // This prevents the TTS engine from rushing the single syllable
                const textToSpeak = `請聽， ${currentWord.char} 。`; 
                
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'zh-TW'; // Mandarin (Taiwan)
                utterance.rate = 0.75;    // Optimal speed: slow enough, but not distorted
                utterance.pitch = 1.1;    // Slightly raise pitch for clearer articulation
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // 4. VALIDATION
        // Check if the user's selected tone matches the data
        function checkTone(selectedTone) {
            if (isProcessing) return; // Prevent multiple clicks during animation

            const buttons = document.querySelectorAll('.tone-btn');
            const clickedBtn = buttons[selectedTone - 1]; // Array is 0-indexed, tones are 1-4
            const msgEl = document.getElementById('feedback-msg');

            if (selectedTone === currentWord.tone) {
                // Correct answer path
                clickedBtn.classList.add('correct');
                msgEl.innerText = "Correct!";
                msgEl.style.color = "#27AE60";
                isProcessing = true;
                
                // Load next question after a short delay
                setTimeout(loadQuestion, 1200);
            } else {
                // Wrong answer path
                clickedBtn.classList.add('wrong');
                msgEl.innerText = "Try again";
                msgEl.style.color = "#C0392B";
                
                // Remove the shake class after animation ends so it can shake again if clicked
                setTimeout(() => {
                    clickedBtn.classList.remove('wrong');
                }, 400);
            }
        }

        // Start the application when the window loads
        window.onload = loadQuestion;
    </script>
</body>
</html>
