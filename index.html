<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone Matrix | Strict Memory Task</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #FAFAFA; 
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            width: 320px;
            position: relative;
            overflow: hidden;
        }

        /* --- OVERLAY FOR BROWSER AUDIO POLICY --- */
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #start-btn {
            font-size: 18px;
            padding: 12px 24px;
            background-color: #3498DB;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #start-btn:hover { background-color: #2980B9; }

        /* Phonological Loop Decay Bar */
        #timer-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #eee;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background-color: #E74C3C;
            transform-origin: left;
            transition: transform 0.1s linear;
        }

        #character-display {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #2C3E50;
            margin-top: 10px;
        }

        #pinyin-base {
            font-size: 28px;
            color: #7F8C8D;
            margin-bottom: 10px; 
        }

        .tone-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .tone-btn {
            font-size: 24px;
            width: 50px;
            height: 50px;
            border: 2px solid #BDC3C7;
            background-color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #34495E;
        }

        .tone-btn:hover:not(:disabled) {
            border-color: #3498DB;
            background-color: #EBF5FB;
        }

        .tone-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .correct { border-color: #2ECC71 !important; background-color: #EAFAF1 !important; color: #27AE60; }
        .wrong { border-color: #E74C3C !important; background-color: #FDEDEC !important; color: #C0392B; }

        #feedback-msg {
            height: 20px;
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-overlay">
            <h2 style="color:#2C3E50; margin-bottom: 10px;">聲調聽辨測試</h2>
            <p style="color:#7F8C8D; font-size:14px; margin-bottom: 20px;">請戴上耳機，準備測試</p>
            <button id="start-btn" onclick="startGame()">開始測驗</button>
        </div>

        <div id="timer-bar-container"><div id="timer-bar"></div></div>

        <div id="character-display">字</div>
        <div id="pinyin-base">zi</div>
        
        <div class="tone-controls">
            <button class="tone-btn" onclick="checkTone(1)" disabled>—</button>
            <button class="tone-btn" onclick="checkTone(2)" disabled>ˊ</button>
            <button class="tone-btn" onclick="checkTone(3)" disabled>ˇ</button>
            <button class="tone-btn" onclick="checkTone(4)" disabled>ˋ</button>
        </div>

        <div id="feedback-msg"></div>
    </div>

    <script>
        const vocabulary = [
            { char: '媽', base: 'ma', tone: 1 },
            { char: '麻', base: 'ma', tone: 2 },
            { char: '馬', base: 'ma', tone: 3 },
            { char: '罵', base: 'ma', tone: 4 },
            { char: '湯', base: 'tang', tone: 1 },
            { char: '糖', base: 'tang', tone: 2 },
            { char: '躺', base: 'tang', tone: 3 },
            { char: '燙', base: 'tang', tone: 4 }
        ];

        let currentWord = null;
        let isProcessing = true; // Start true so nothing can be clicked until init
        
        // Timer variables
        let countdownTimer = null;
        let timeRemaining = 2000; 
        const totalTime = 2000;

        // --- NEW: Initialize by user interaction ---
        function startGame() {
            // Hide the overlay
            document.getElementById('start-overlay').style.display = 'none';
            
            // A silent initialization to wake up the speech synthesis engine on iOS/Safari
            if ('speechSynthesis' in window) {
                const initMsg = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(initMsg);
            }

            // Start the first question
            loadQuestion();
        }

        function loadQuestion() {
            isProcessing = true; // Lock the system while loading
            clearInterval(countdownTimer);
            document.getElementById('timer-bar').style.transform = 'scaleX(1)';
            
            const buttons = document.querySelectorAll('.tone-btn');
            buttons.forEach(btn => {
                btn.className = 'tone-btn'; 
                btn.disabled = true; // Lock buttons before audio plays
            });
            document.getElementById('feedback-msg').innerText = "請準備聽音...";
            document.getElementById('feedback-msg').style.color = "#7F8C8D";

            currentWord = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            document.getElementById('character-display').innerText = currentWord.char;
            document.getElementById('pinyin-base').innerText = currentWord.base;

            // Short delay before playing the audio
            setTimeout(playAudio, 1000); 
        }

        function playAudio() {
            if ('speechSynthesis' in window && currentWord) {
                window.speechSynthesis.cancel(); 
                
                const textToSpeak = `請聽， ${currentWord.char} 。`; 
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'zh-TW'; 
                utterance.rate = 0.75;    
                utterance.pitch = 1.1;
                
                // Fallback mechanism: If onend fails to fire (browser quirk), start timer anyway after 2 seconds
                let fallbackTimer = setTimeout(() => {
                    if (isProcessing) startMemoryDecayTimer();
                }, 2000);

                utterance.onend = function() {
                    clearTimeout(fallbackTimer);
                    startMemoryDecayTimer();
                };

                // Handle error cases (e.g., if speech synthesis is interrupted)
                utterance.onerror = function(e) {
                    console.error("Speech synthesis error", e);
                    clearTimeout(fallbackTimer);
                    startMemoryDecayTimer(); // Don't freeze the game
                }

                window.speechSynthesis.speak(utterance);
            } else {
                // If TTS is completely unavailable, just start the timer so the game doesn't break
                startMemoryDecayTimer();
            }
        }

        function startMemoryDecayTimer() {
            if (!isProcessing) return; // Prevent multiple triggers
            isProcessing = false; // Unlock the game state
            timeRemaining = totalTime;
            
            // Unlock buttons for the user to answer
            document.querySelectorAll('.tone-btn').forEach(btn => btn.disabled = false);
            document.getElementById('feedback-msg').innerText = "請作答！";

            const timerBar = document.getElementById('timer-bar');

            countdownTimer = setInterval(() => {
                timeRemaining -= 50; 
                const scale = Math.max(0, timeRemaining / totalTime);
                timerBar.style.transform = `scaleX(${scale})`;

                if (timeRemaining <= 0) {
                    clearInterval(countdownTimer);
                    handleTimeout(); 
                }
            }, 50);
        }

        function handleTimeout() {
            if (isProcessing) return;
            isProcessing = true;
            
            document.querySelectorAll('.tone-btn').forEach(btn => btn.disabled = true);
            const msgEl = document.getElementById('feedback-msg');
            
            msgEl.innerText = "Timeout: 語音記憶已衰退";
            msgEl.style.color = "#D68910";
            
            setTimeout(loadQuestion, 1500);
        }

        function checkTone(selectedTone) {
            if (isProcessing) return;
            isProcessing = true;
            clearInterval(countdownTimer); // Stop the decay timer

            const buttons = document.querySelectorAll('.tone-btn');
            buttons.forEach(btn => btn.disabled = true); // Lock buttons immediately
            
            const clickedBtn = buttons[selectedTone - 1]; 
            const msgEl = document.getElementById('feedback-msg');

            if (selectedTone === currentWord.tone) {
                clickedBtn.classList.add('correct');
                msgEl.innerText = "正確 (Correct!)";
                msgEl.style.color = "#27AE60";
            } else {
                clickedBtn.classList.add('wrong');
                msgEl.innerText = "錯誤 (Wrong)";
                msgEl.style.color = "#C0392B";
            }

            // Load next question
            setTimeout(loadQuestion, 1500);
        }

        // Removed window.onload = loadQuestion; to enforce the start button click
    </script>
</body>
</html>
